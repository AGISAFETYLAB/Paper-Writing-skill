name: academic-writing
version: 1.0.0
description: >
  Hub manifest for the standalone finance writing package.

always_load:
  - ../../_shared/core/stance.md
  - ../../_shared/core/gates.md
  - ../../_shared/core/output-format.md

axes:
  workflow:
    detect: |
      Full Draft Workflow when the user provides a workspace or asks for a complete first
      manuscript from source materials. Draft Revision Workflow when the user
      provides existing prose or LaTeX and asks to revise, polish, compress, diagnose, or prepare
      a version for submission.
    values:
      full-draft: static/workflow/full-draft.md
      package-completion: static/workflow/full-draft.md
      draft-version: static/workflow/draft-revision.md  # legacy alias
      draft-revision: static/workflow/draft-revision.md
      audit-only: static/workflow/draft-revision.md
      revision-response: static/workflow/revision-response.md
    default: draft-revision
    multi: false

  version_target:
    detect: |
      Select working-paper, journal-submission, or conference-submission. Default to working-paper
      for early drafts and journal-submission for readiness/submission requests.
    values:
      working-paper: ../../_shared/version-targets/working-paper.md
      journal-submission: ../../_shared/version-targets/journal-submission.md
      conference-submission: ../../_shared/version-targets/conference-submission.md
    default: working-paper
    multi: false

  paper_type:
    detect: |
      Select the structural paper type. Use explicit user wording first. If the user names only a
      finance domain or method, keep that as separate planning context and choose the structural
      profile that controls section order: empirical research, theoretical model, short insight /
      letter, review/survey/perspective, comment/replication/corrigendum, data/method/software, or
      generic finance paper.
    values:
      generic-finance-paper: ../../_shared/paper-types/generic-finance-paper.md
      empirical-research-paper: ../../_shared/paper-types/empirical-research-paper.md
      theoretical-model-paper: ../../_shared/paper-types/theoretical-model-paper.md
      short-insight-letter-paper: ../../_shared/paper-types/short-insight-letter-paper.md
      review-survey-perspective-paper: ../../_shared/paper-types/review-survey-perspective-paper.md
      comment-replication-corrigendum-paper: ../../_shared/paper-types/comment-replication-corrigendum-paper.md
      data-method-software-paper: ../../_shared/paper-types/data-method-software-paper.md
    default: generic-finance-paper
    multi: false

  section:
    detect: |
      Load when drafting or revising named manuscript sections, or when creating a full manuscript.
    values:
      title-abstract: references/sections/title-abstract.md
      introduction: references/sections/introduction.md
      literature-positioning: references/sections/literature-positioning.md
      data-institutional-setting: references/sections/data-institutional-setting.md
      data-methods: references/sections/identification-methods.md
      identification-methods: references/sections/identification-methods.md
      theory-model: references/sections/theory-model.md
      results: references/sections/results.md
      mechanisms-robustness: references/sections/mechanisms-robustness.md
      discussion: references/sections/discussion-conclusion.md
      discussion-conclusion: references/sections/discussion-conclusion.md
      appendix: references/sections/appendix-online-appendix.md
      appendix-online-appendix: references/sections/appendix-online-appendix.md
    multi: true

stages:
  - condition: "Writing Policy stage"
    path: static/workflow/stages/writing-policy.md
  - condition: "Paper Framework stage"
    path: static/workflow/stages/paper-framework.md
  - condition: "LaTeX manuscript setup"
    path: static/workflow/stages/latex-project.md
  - condition: "Section drafting loop"
    path: static/workflow/stages/section-drafting.md
  - condition: "Referee/editor response package"
    path: static/workflow/revision-response.md

delegates:
  - skill: academic-figure
    path: ../academic-figure/SKILL.md
    when: "any finance table, figure, regression display, event-study plot, or appendix display is planned or produced"
  - skill: academic-citation
    path: ../academic-citation/SKILL.md
    when: "any citation, data/software citation, or bibliography entry is needed or audited"
  - skill: academic-review
    path: ../academic-review/SKILL.md
    when: "the first complete paper/ draft exists or submission-readiness/data-code review is requested"

references:
  on_demand:
    - condition: "template selection or compiled PDF project assembly"
      path: ../../_shared/submission/templates.md
    - condition: "template selection or compiled PDF project assembly"
      path: ../../assets/templates/index.md
    - condition: "journal, conference, working-paper platform, or submission-standard check"
      path: ../../_shared/venues/standards/index.md
    - condition: "drafting, polishing, anti-AI style, abstract/introduction/results/conclusion prose"
      path: references/prose-style.md
    - condition: "Finance Writing Craft Gate, Contribution And Belief-Update Gate, Results Narrative Gate, Title-Abstract-Introduction Scorecard, writing_craft_status, belief_update_status, results_narrative_status, or prose lint"
      path: references/writing-craft.md
    - condition: "finance prose lint, banned AI phrase, empty contribution phrase, causal language without identification cue, significance without magnitude cue, or table tour sentence"
      path: scripts/lint_finance_prose.py
    - condition: "finance domain, subfield, JEL G category, asset pricing, corporate finance, banking, financial institutions, market microstructure, behavioral finance, household finance, fintech, digital assets, accounting, disclosure, risk, insurance, derivatives, macro finance, international finance, ESG, climate finance, real estate, private equity, venture capital, or domain adapter"
      path: ../../_shared/checks/finance-domains.md
    - condition: "method family, JEL C, DiD, IV, RD, synthetic control, event studies, portfolio sorts, factor models, structural estimation, ML, experiment, survey, theory proof, or backtest writing"
      path: ../../_shared/checks/identification-strategies.md
    - condition: "journal, working-paper, conference, data availability, or reproducibility planning"
      path: ../../_shared/venues/index.md
    - condition: "data/code availability, replication package, vendor restrictions, or online appendix"
      path: ../../_shared/checks/data-code.md
    - condition: "dataset profile, code audit, script registry, code sweep, or replication package map"
      path: ../../_shared/checks/research-workflow.md
    - condition: "identification, econometrics, standard errors, backtest, or robustness"
      path: ../../_shared/checks/econometrics.md
    - condition: "figure palette, Display-Item Plan color consistency, grayscale fallback, or paper-level visual style"
      path: ../academic-figure/references/finance-palette.md
    - condition: "Display Choice Gate, figure-versus-table choice, display duplication, key-result display planning, or backend-neutral display selection"
      path: ../academic-figure/references/display-selection.md
    - condition: "Finance Table Design Gate, table content hygiene, venue-specific table override, table skeletons, table payoff, table provenance ledger, source_table_to_script_map, page_budget_cost, appendix destination, or table static lint"
      path: ../academic-figure/references/table-design.md
    - condition: "LaTeX finance table lint, vertical rules, hline, resizebox, tabularx declared-width defects, missing captions, or leading decimals without zero"
      path: ../academic-figure/scripts/lint_finance_tables.py
    - condition: "Display-Item Plan placement, single-column, double-column, figure*, table*, final size, float ordering, or appendix overflow"
      path: ../academic-figure/references/figure-layout.md
    - condition: "section guide routing, section drafting, section revision, or full manuscript section planning"
      path: references/sections/index.md
    - condition: "section drafting, section revision, paragraph flow, reverse-outline audit, or one-message paragraph"
      path: references/sections/paragraph-flow.md
    - condition: "title, abstract, keywords, highlights, or title-abstract-introduction scorecard"
      path: references/sections/title-abstract.md
    - condition: "introduction, opening paragraphs, contribution setup, or roadmap"
      path: references/sections/introduction.md
    - condition: "related work, literature review, contribution positioning, closest papers, or literature narrative"
      path: references/sections/literature-positioning.md
    - condition: "data section, sample construction, institutional setting, variable construction, or summary statistics"
      path: references/sections/data-institutional-setting.md
    - condition: "methods section, identification section, empirical design, econometric specification, or inference wording"
      path: references/sections/identification-methods.md
    - condition: "theory section, model section, structural model, assumptions, propositions, or comparative statics"
      path: references/sections/theory-model.md
    - condition: "results section, main estimates, empirical findings, model output, or result hierarchy"
      path: references/sections/results.md
    - condition: "mechanism, heterogeneity, robustness, placebo, sensitivity, or alternative explanation"
      path: references/sections/mechanisms-robustness.md
    - condition: "discussion, conclusion, implications, limitations, or external validity"
      path: references/sections/discussion-conclusion.md
    - condition: "appendix, online appendix, Internet Appendix, proofs, extra tables, or supplemental analysis"
      path: references/sections/appendix-online-appendix.md
    - condition: "examples of finance paper structures"
      path: references/examples.md
    - condition: "paper-type selection map or profile boundary rules"
      path: ../../_shared/paper-types/index.md
    - condition: "paper-type structural deviation or Paper Framework hard default"
      path: ../../_shared/paper-types/profile-boundary.md
    - condition: "editor/referee reports, revise-and-resubmit, response letter, or revision map"
      path: references/referee-response.md
