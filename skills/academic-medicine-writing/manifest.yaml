name: academic-medicine-writing
version: 0.2.0
description: >
  Package map for the standalone medicine academic-writing package.

subskills:
  academic-writing:
    path: skills/academic-writing/SKILL.md
    owns: medical manuscript writing and revision orchestration
  academic-figure:
    path: skills/academic-figure/SKILL.md
